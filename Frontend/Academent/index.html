    <script>(function(){try{var m=String(localStorage.getItem('academent-theme-mode')||'').toLowerCase();var n=m==='dark'?'dark':m==='system'?'system':'light';var r=n==='system'&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':n;var e=document.documentElement;e.classList.toggle('dark',r==='dark');e.dataset.theme=r;e.dataset.themeMode=n;}catch(e){document.documentElement.dataset.theme='light';document.documentElement.dataset.themeMode='light';}})();</script>
